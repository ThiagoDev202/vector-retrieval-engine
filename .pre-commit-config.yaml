repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        types: [python]
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: uv run mypy app
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
      - id: pytest
        name: pytest
        entry: uv run pytest -x -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
      - id: pip-audit
        name: pip-audit
        entry: uv run pip-audit --strict
        language: system
        types: [python]
        pass_filenames: false
        stages: [manual]
